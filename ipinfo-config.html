<script type="text/javascript">
    RED.nodes.registerType('ipinfo-config', {
        category: 'config',
        defaults: {
            name: { value: "IPInfo Config", required: true },
            timeout: {
                value: "1000", required: true,
                validate: RED.validators.typedInput({ type: 'num' })
            },
            cacheEnabled: { value: false },
            maxitem: {
                value: "5000", required: false,
                validate: RED.validators.typedInput({ type: 'num' })
            },
            ttl: {
                value: "" + (24 * 1000 * 60 * 60), required: false,
                validate: RED.validators.typedInput({ type: 'num' })
            }
        },
        credentials: {
            token: { type: "password" }
        },
        label: function () {
            return this.name || "IPInfo Config";
        },
        oneditprepare: function () {
            $("#node-config-input-timeout").typedInput({
                type: "num",
                types: ["num"],
                typeField: "#node-config-input-timeout-type"
            });
            $("#node-config-input-maxitem").typedInput({
                type: "num",
                types: ["num"],
                typeField: "#node-config-input-maxitem-type"
            });
            $("#node-config-input-ttl").typedInput({
                type: "num",
                types: ["num"],
                typeField: "#node-config-input-ttl-type"
            });

            $("#node-config-input-cacheEnabled").on("change", function () {
                if ($(this).is(":checked")) {
                    $(".node-config-input-cacheEnabled-row").show();
                } else {
                    $(".node-config-input-cacheEnabled-row").hide();
                }
                RED.tray.resize();
            });
        }
    });
</script>

<script type="text/html" data-template-name="ipinfo-config">
    <div class="form-row">
        <label for="node-config-input-name"><i class="fa fa-tag"></i> <span data-i18n="ipinfo.label.name">Name</span></label>
        <input type="text" id="node-config-input-name">
    </div>
    <div class="form-row">
        <label for="node-config-input-token"><i class="fa fa-key"></i> <span data-i18n="ipinfo.label.token">Token</span></label>
        <input type="password" id="node-config-input-token">
    </div>
    <div class="form-row">
        <label for="node-config-input-timeout"><i class="fa fa-clock-o"></i> <span data-i18n="ipinfo.label.timeout">Timeout</span></label>
        <input type="text" id="node-config-input-timeout">
        <input type="hidden" id="node-config-input-timeout-type">
    </div>
    <div class="form-row">
        <label for="node-config-input-cacheEnabled"><i class="fa fa-database"></i> <span data-i18n="ipinfo.label.cacheEnabled">Cache</span></label>
        <input type="checkbox" id="node-config-input-cacheEnabled" style="display:inline-block; width:auto; vertical-align:top;">
    </div>
    <div class="form-row">
        <div style="margin-left:20px" class="node-config-input-cacheEnabled-row hide">
            <div class="form-row">
                <label for="node-config-input-maxitem"><i class="fa fa-ellipsis-h"></i> <span data-i18n="ipinfo.label.maxitem">Max Items</span></label>
                <input type="text" id="node-config-input-maxitem">
                <input type="hidden" id="node-config-input-maxitem-type">
            </div>
            <div class="form-row">
                <label for="node-config-input-ttl"><i class="fa fa-hourglass-half"></i> <span data-i18n="ipinfo.label.ttl">TTL (ms)</span></label>
                <input type="text" id="node-config-input-ttl">
                <input type="hidden" id="node-config-input-ttl-type">
            </div>
        </div>
    </div>
</script>

<script type="text/html" data-help-name="ipinfo-config">
    <p>Configuration node for the IPInfo.io geolocation service.</p>

    <h3>Settings</h3>
    <dl class="message-properties">
        <dt>Name</dt>
        <dd>Display name for this configuration instance.</dd>
        <dt>Token</dt>
        <dd>Your <a href="https://ipinfo.io/account/token" target="_blank">IPInfo.io API token</a>. Stored securely as a credential.</dd>
        <dt>Timeout</dt>
        <dd>HTTP request timeout in milliseconds (default: <code>1000</code>).</dd>
        <dt>Cache</dt>
        <dd>Enable an in-memory LRU cache to reduce API calls and improve response times.</dd>
        <dt>Max Items</dt>
        <dd>Maximum number of entries in the cache (default: <code>5000</code>).</dd>
        <dt>TTL</dt>
        <dd>Time-to-live for each cache entry in milliseconds (default: <code>86400000</code> = 24 hours).</dd>
    </dl>

    <h3>Details</h3>
    <p>This node is shared across all <code>ipinfo</code> nodes that reference it. Create one config per API token.</p>
    <p>Enabling the cache is recommended for production use — it prevents redundant API calls for recently looked-up IPs and helps you stay within your plan's rate limits.</p>

    <h3>References</h3>
    <ul>
        <li><a href="https://ipinfo.io/docs" target="_blank">IPInfo.io API Documentation</a></li>
        <li><a href="https://ipinfo.io/account/token" target="_blank">Get your API token</a></li>
        <li><a href="https://github.com/gautric/node-red-ipinfo" target="_blank">GitHub Repository</a></li>
    </ul>
</script>
